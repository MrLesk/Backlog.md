name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  checks: write
  pull-requests: write

env:
  BUN_VERSION: 1.3.14

jobs:
  test:
    name: lint-and-unit-test
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          # Bun >=1.3 includes stdin pause/subprocess handoff fixes used by TUI editor launch.
          bun-version: ${{ env.BUN_VERSION }}
      - uses: actions/cache@v6
        id: cache
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-${{ matrix.os }}-bun-${{ env.BUN_VERSION }}-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.os }}-bun-${{ env.BUN_VERSION }}-
      - run: bun install --frozen-lockfile --linker=isolated
      - run: bun run check:types
      - run: bun run lint
      - name: Run tests
        run: |
          # Isolate test files because some suites intentionally mutate global process state.
          bun test --isolate --timeout=10000 --reporter=junit --reporter-outfile=test-results.xml
        shell: bash
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.os }}
          path: test-results.xml
          if-no-files-found: error
      - name: Run interactive TUI regression tests
        if: matrix.os == 'ubuntu-latest'
        run: bash scripts/run-tui-interactive-tests.sh
      - name: Upload interactive TUI transcripts on failure
        if: failure() && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v7
        with:
          name: tui-interactive-transcripts-${{ matrix.os }}
          path: tmp/tui-interactive-transcripts/*.log
          if-no-files-found: ignore

  test-windows:
    name: unit-test-windows (${{ matrix.shard }}/${{ matrix.total_shards }})
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
        total_shards: [3]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          # Bun >=1.3 includes stdin pause/subprocess handoff fixes used by TUI editor launch.
          bun-version: ${{ env.BUN_VERSION }}
      - uses: actions/cache@v6
        id: cache
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-windows-latest-bun-${{ env.BUN_VERSION }}-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-windows-latest-bun-${{ env.BUN_VERSION }}-
      - run: bun install --frozen-lockfile --linker=isolated
      - run: bun run check:types
        if: matrix.shard == 1
      - run: bun run lint
        if: matrix.shard == 1
      - name: Run Windows test shard
        shell: bash
        run: |
          test_files=()
          while IFS= read -r test_file; do
            test_files+=("$test_file")
          done < <(bun scripts/list-test-shard.ts "${{ matrix.shard }}" "${{ matrix.total_shards }}")

          if (( ${#test_files[@]} == 0 )); then
            echo "No test files selected for shard ${{ matrix.shard }}/${{ matrix.total_shards }}."
            exit 1
          fi

          echo "Running Windows test shard ${{ matrix.shard }}/${{ matrix.total_shards }} with ${#test_files[@]} files."
          # Windows runners hit Bun/file-system resource pressure under in-process concurrency, so shard by CI job instead.
          bun test --isolate --timeout=30000 --max-concurrency=4 --reporter=junit --reporter-outfile="test-results-${{ matrix.shard }}.xml" "${test_files[@]}"
      - name: Upload Windows test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-windows-${{ matrix.shard }}
          path: test-results-${{ matrix.shard }}.xml
          if-no-files-found: error

  test-windows-complete:
    name: lint-and-unit-test (windows-latest)
    needs: test-windows
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check Windows test shards
        shell: bash
        run: |
          if [[ "${{ needs.test-windows.result }}" != "success" ]]; then
            echo "Windows test shards finished with result: ${{ needs.test-windows.result }}"
            exit 1
          fi

  build-test:
    name: compile-and-smoke-test
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64-baseline
          - os: macos-latest
            target: bun-darwin-x64
          - os: windows-latest
            target: bun-windows-x64-baseline
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          # Bun >=1.3 includes stdin pause/subprocess handoff fixes used by TUI editor launch.
          bun-version: ${{ env.BUN_VERSION }}
      - uses: actions/cache@v6
        id: cache
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-${{ matrix.os }}-bun-${{ env.BUN_VERSION }}-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.os }}-bun-${{ env.BUN_VERSION }}-
      - run: bun install --frozen-lockfile --linker=isolated
      - name: Prime Bun cache for baseline target (Windows workaround)
        if: ${{ contains(matrix.target, 'baseline') && matrix.os == 'windows-latest' }}
        shell: bash
        run: |
          # Workaround for https://github.com/oven-sh/bun/issues/13513
          # Build a dummy project from C:\ to prime the baseline binary cache
          cd /c
          mkdir -p bun-cache-primer
          cd bun-cache-primer
          echo 'console.log("cache primer")' > index.js
          bun build --compile --target=${{ matrix.target }} ./index.js --outfile primer.exe || true
          cd $GITHUB_WORKSPACE
      - name: Build standalone binary
        shell: bash
        run: |
          VER="$(jq -r .version package.json)"
          OUT="backlog-test${{ contains(matrix.target,'windows') && '.exe' || '' }}"
          BACKLOG_BUILD_VERSION="$VER" \
            BACKLOG_BUILD_TARGET="${{ matrix.target }}" \
            BACKLOG_BUILD_OUTFILE="$OUT" \
            bun scripts/build.ts
      - name: Smoke-test binary
        shell: bash
        run: |
          FILE="backlog-test${{ contains(matrix.target,'windows') && '.exe' || '' }}"
          VER="$(jq -r .version package.json)"
          chmod +x "$FILE"
          bun scripts/smoke-compiled-build.ts "$FILE" "$VER"
      - name: Run interactive TUI tests against compiled binary
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          RUN_INTERACTIVE_TUI_TESTS=1 \
          TUI_TEST_CLI_RUNTIME= \
          TUI_TEST_CLI_PATH="$PWD/backlog-test" \
          bun test src/test/tui-interactive-editor-handoff.test.ts --timeout=30000
      - name: Upload compiled-binary interactive transcripts on failure
        if: failure() && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v7
        with:
          name: tui-interactive-transcripts-compiled-${{ matrix.os }}
          path: tmp/tui-interactive-transcripts/*.log
          if-no-files-found: ignore
