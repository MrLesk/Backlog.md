name: Shai-Hulud 2.0 Security Check
permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  security-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # Pinned to v1: v2 crashes ("Cannot convert undefined or null to object")
      # and still runs on node20, so it offers no upgrade benefit for us.
      - uses: gensecaihq/Shai-Hulud-2.0-Detector@v1
        with:
          fail-on-critical: true